<html lang="en">
<head>

    <script>
        (function() {
            var appStoreURL = "https://apps.apple.com/app/tapped/id6744253592";
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

            if (isIOS) {
                window.location.replace("https://apps.apple.com/us/app/tapped-focus-to-do/id6759153070");
            } else {
                window.location.replace(appStoreURL);
            }
        })();
    </script>
